# ---------------------------------------------------------
# wemos-d1-8ledkeys v1.0
# ---------------------------------------------------------
# This ESPHome configuration turns a Wemos D1 Mini with a
# TM1638 module into a simple 8‑button, 8‑LED control panel.
# The display shows the current time when Home Assistant time
# is available, and a wave animation until connection is ready.
# Buttons only publish their state.
# LEDs can be controlled from Home Assistant or automations.
# ---------------------------------------------------------

esphome:
  name: wemos-d1-8ledkeys
  friendly_name: wemos-d1-8ledkeys

  on_boot:
    priority: -100
    then:
      - delay: 200ms
      - lambda: |-
          id(TM1638Button1).publish_state(false);
          id(TM1638Button2).publish_state(false);
          id(TM1638Button3).publish_state(false);
          id(TM1638Button4).publish_state(false);
          id(TM1638Button5).publish_state(false);
          id(TM1638Button6).publish_state(false);
          id(TM1638Button7).publish_state(false);
          id(TM1638Button8).publish_state(false);

esp8266:
  board: d1_mini

logger:

api:
  encryption:
    key: !secret wemos_d1_8ledkeys_api_key

ota:
  - platform: esphome
    password: !secret wemos_d1_8ledkeys_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "wemos-d1-8ledkeys"
    password: "wemosd2ledkeys"

time:
  - platform: homeassistant
    id: homeassistant_time

# -------------------
# TM1638 Display
# -------------------
globals:
  - id: anim_digit
    type: int
    restore_value: no
    initial_value: "-1"

display:
  platform: tm1638
  id: tm1638_display
  clk_pin: GPIO14
  dio_pin: GPIO12
  stb_pin: GPIO13
  update_interval: 500ms
  lambda: |-
    // If animation is active, show the digit animation
    if (id(anim_digit) >= 0) {
      it.print("        ");
      it.print(id(anim_digit), "8");
      return;
    }

    static bool i = 0;
    static int wave_phase = 0;

    // If time is available → show clock
    if (id(homeassistant_time).now().is_valid()) {
      if (!i)
        it.strftime("%H-%M-%S", id(homeassistant_time).now());
      else
        it.strftime("%H %M %S", id(homeassistant_time).now());
    }

    // Otherwise → ASCII wave animation
    else {
      const char base[9] = "AGDGAGDG";
      char buf[9];

      for (int x = 0; x < 8; x++) {
        int idx = (x + wave_phase) % 8;
        buf[x] = base[idx];
      }
      buf[8] = 0;

      it.printf("%s", buf);

      wave_phase++;
      if (wave_phase >= 8)
        wave_phase = 0;
    }

    i = !i;

# -------------------
# LED Outputs
# -------------------
output:
  - platform: tm1638
    id: TM1638Led1
    led: 0

  - platform: tm1638
    id: TM1638Led2
    led: 1

  - platform: tm1638
    id: TM1638Led3
    led: 2

  - platform: tm1638
    id: TM1638Led4
    led: 3

  - platform: tm1638
    id: TM1638Led5
    led: 4

  - platform: tm1638
    id: TM1638Led6
    led: 5

  - platform: tm1638
    id: TM1638Led7
    led: 6

  - platform: tm1638
    id: TM1638Led8
    led: 7

# -------------------
# TM1638 Buttons
# -------------------
binary_sensor:

  - platform: tm1638
    name: "TM1638 Button 1"
    id: TM1638Button1
    key: 0
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 0;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 2"
    id: TM1638Button2
    key: 1
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 1;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 3"
    id: TM1638Button3
    key: 2
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 2;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 4"
    id: TM1638Button4
    key: 3
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 3;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 5"
    id: TM1638Button5
    key: 4
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 4;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 6"
    id: TM1638Button6
    key: 5
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 5;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 7"
    id: TM1638Button7
    key: 6
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 6;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;

  - platform: tm1638
    name: "TM1638 Button 8"
    id: TM1638Button8
    key: 7
    filters:
      - delayed_on: 10ms
    on_press:
      - lambda: |-
          id(anim_digit) = 7;
    on_release:
      - lambda: |-
          id(anim_digit) = -1;
